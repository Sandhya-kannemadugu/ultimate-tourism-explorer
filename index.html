<!DOCTYPE html>
<html>
<head>
<title>Ultimate Tourism Project Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
background-size:cover;
color:white;
text-align:center;
}

/* HEADER */
h1{
background:rgba(0,0,0,0.6);
padding:15px;
}

/* SEARCH */
input{
width:60%;
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
color:white;
}

/* CARD STYLE */
.card{
background:rgba(0,0,0,0.7);
margin:10px auto;
padding:15px;
border-radius:10px;
cursor:pointer;
width:60%;
}

/* IMAGE SLIDER */
#imageContainer{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

#placeImage{
width:700px;
height:400px;
object-fit:cover;
border-radius:12px;
}

</style>
</head>

<body>

<h1>🌍 Ultimate Tourism Explorer</h1>

<!-- SEARCH PAGE -->
<div id="searchPage">

<input id="searchInput"
placeholder="Search Location..."
onkeyup="searchLocation()">

<div id="locations"></div>

</div>

<!-- LOCATION PAGE -->
<div id="placePage" style="display:none">
<h2 id="locationTitle"></h2>

<button onclick="goBack()">⬅ Back</button>

<div id="places"></div>
</div>

<!-- PLACE DETAILS -->
<div id="detailsPage" style="display:none">

<h2 id="placeName"></h2>

<button onclick="backToPlaces()">⬅ Back</button>

<div id="imageContainer">
<button onclick="prevImage()">⬅</button>
<img id="placeImage">
<button onclick="nextImage()">➡</button>
</div>

<p id="placeInfo"></p>
<p id="placeTravel"></p>

<button onclick="bookTicket()">🎫 Book Ticket</button>

</div>

<script>

/* ===============================
   TOURISM DATABASE
================================ */

const tourismData={

Goa:{
"Baga Beach":{
images:[
"https://s7ap1.scene7.com/is/image/incredibleindia/baga-beach-goa-goa-baga-beach-1-attr-hero?qlt=82&ts=1742156326916",
"https://blog.hireavilla.in/wp-content/uploads/2024/05/chair-table-dinning-beach-sea-with-blue-sky-scaled.jpg",
"https://s7ap1.scene7.com/is/image/incredibleindia/baga-beach-goa-goa-baga-beach-5-attr-hero?qlt=82&ts=1742158715782"
],
info:"Famous beach for nightlife & water sports.",
travel:"Reach via Goa Airport or Madgaon Railway Station."
},

"Calangute Beach":{
images:[
"https://s7ap1.scene7.com/is/image/incredibleindia/calangute-beach-goa-5-musthead-hero?qlt=82&ts=1742168937195",
"https://hikerwolf.com/wp-content/uploads/2020/05/goa-beaches.jpg"
],
info:"Queen of Beaches in Goa.",
travel:"Taxi from Panaji."
},

"Dudhsagar Falls":{
images:[
"https://source.unsplash.com/800x400/?dudhsagar waterfall",
"https://source.unsplash.com/800x400/?goa waterfall"
],
info:"One of India's tallest waterfalls.",
travel:"Jeep safari from Mollem."
}
},

Kerala:{
"Munnar":{
images:[
"https://www.viacation.com/_next/image?url=https%3A%2F%2Fmedia.viacation.com%2Fblogs%2F6f804e3d43425e8c8d7e1.jpg&w=2560&q=75",
"https://www.teavalleyresort.com/wp-content/uploads/2023/04/hotels-in-munnar-1024x683.jpg"
],
info:"Beautiful hill station with tea plantations.",
travel:"Nearest airport Kochi."
},

"Alleppey":{
images:[
"https://deih43ym53wif.cloudfront.net/alleppey-kerala-india-shutterstock_1154918653_25793b1171.jpeg",
"https://clubmahindra.gumlet.io/blog/media/section_images/best-time--69025739ee96e70.jpg?w=376&dpr=2.6"
],
info:"Famous for backwater cruises.",
travel:"Train & road connectivity available."
}
},

Delhi:{
"India Gate":{
images:[
"https://s7ap1.scene7.com/is/image/incredibleindia/india-gate-delhi-1-attr-hero?qlt=82&ts=1742159856441",
"https://www.fabhotels.com/blog/wp-content/uploads/2019/06/India-Gate_1400.jpg:cf-webp:w-450:h-240"
],
info:"War memorial and popular tourist spot.",
travel:"Metro connectivity available."
},

"Red Fort":{
images:[
"https://source.unsplash.com/800x400/?red fort delhi",
"https://source.unsplash.com/800x400/?lal qila"
],
info:"UNESCO heritage Mughal monument.",
travel:"Reach via Chandni Chowk Metro."
}
},

Karnataka:{
"Mysore Palace":{
images:[
"https://images.lifestyleasia.com/wp-content/uploads/sites/7/2023/07/25152833/Mysore-Palace-FI.jpg?tr=w-1200,h-900",
"https://footloosedev.com/wp-content/uploads/mysore-palace.jpg"
],
info:"Royal heritage palace.",
travel:"3 hrs from Bangalore."
},

"Coorg":{
images:[
"https://source.unsplash.com/800x400/?coorg hills",
"https://source.unsplash.com/800x400/?coorg coffee plantation"
],
info:"Scotland of India.",
travel:"Bus & car from Mysore."
}
}

};

/* ===============================
SHOW ALL LOCATIONS
================================ */

function showAllLocations(){

let result="";

for(let location in tourismData){
result+=`
<div class="card"
onclick="showPlaces('${location}')">
${location}
</div>`;
}

document.getElementById("locations").innerHTML=result;
}

showAllLocations();

/* ===============================
SEARCH LOCATION
================================ */

function searchLocation(){

let input=document.getElementById("searchInput").value.toLowerCase();

if(input===""){
showAllLocations();
return;
}

let result="";

for(let location in tourismData){

if(location.toLowerCase().includes(input)){
result+=`
<div class="card"
onclick="showPlaces('${location}')">
${location}
</div>`;
}
}

document.getElementById("locations").innerHTML=result;
}

/* ===============================
SHOW PLACES IN LOCATION
================================ */

function showPlaces(location){

document.getElementById("searchPage").style.display="none";
document.getElementById("placePage").style.display="block";

document.getElementById("locationTitle").innerText=
"Tourist Places in "+location;

let html="";

for(let place in tourismData[location]){
html+=`
<div class="card"
onclick="showPlaceDetails('${location}','${place}')">
${place}
</div>`;
}

document.getElementById("places").innerHTML=html;
}

/* ===============================
PLACE DETAILS
================================ */

let currentImages=[];
let imageIndex=0;
let currentLocation="";

function showPlaceDetails(location,place){

currentLocation=location;

document.getElementById("placePage").style.display="none";
document.getElementById("detailsPage").style.display="block";

let data=tourismData[location][place];

currentImages=data.images;
imageIndex=0;

document.getElementById("placeImage").src=currentImages[0];
document.getElementById("placeName").innerText=place;
document.getElementById("placeInfo").innerText=data.info;
document.getElementById("placeTravel").innerText=
"How to Reach: "+data.travel;
}

/* SLIDER */

function nextImage(){
imageIndex=(imageIndex+1)%currentImages.length;
document.getElementById("placeImage").src=currentImages[imageIndex];
}

function prevImage(){
imageIndex--;
if(imageIndex<0) imageIndex=currentImages.length-1;
document.getElementById("placeImage").src=currentImages[imageIndex];
}

/* ===============================
BACK BUTTONS
================================ */

function goBack(){
document.getElementById("placePage").style.display="none";
document.getElementById("searchPage").style.display="block";
}

function backToPlaces(){
document.getElementById("detailsPage").style.display="none";
document.getElementById("placePage").style.display="block";
}

/* ===============================
TICKET BOOKING
================================ */

function bookTicket(){
window.open("https://www.makemytrip.com","_blank");
}

</script>

</body>
</html>
